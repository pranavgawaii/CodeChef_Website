<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | CodeChef MIT-ADT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        :root {
            --bg-color: #f9fafb;
            --card-color: #ffffff;
            --text-main: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --accent-solid: #000000;
        }

        [data-theme="dark"] {
            --bg-color: #0c0c0c;
            --card-color: #161616;
            --text-main: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #262626;
            --accent-solid: #ffffff;
        }

        body.profile-clean {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .dashboard-wrapper {
            width: 100%;
            max-width: 520px;
            animation: pureFadeIn 0.5s ease;
        }

        @keyframes pureFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .dashboard-header img {
            height: 48px;
            margin-bottom: 12px;
        }

        .dashboard-header h1 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .clean-card {
            background: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .avatar-clean {
            width: 80px;
            height: 80px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            margin: 0 auto 24px;
        }

        .user-main-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 6px 0;
        }

        .user-role-tag {
            display: inline-block;
            padding: 4px 10px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 32px;
        }

        .info-list {
            text-align: left;
            margin-bottom: 32px;
            border-top: 1px solid var(--border-color);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .info-value {
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .button-group {
            display: grid;
            gap: 12px;
        }

        .btn-clean {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-black {
            background: var(--accent-solid);
            color: var(--bg-color);
            border: 1px solid var(--accent-solid);
        }

        .btn-black:hover {
            opacity: 0.9;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            background: var(--bg-color);
            color: var(--text-main);
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-decoration: none;
        }

        .footer-link:hover {
            color: var(--text-main);
        }

        @media (max-width: 480px) {
            .clean-card { padding: 30px 20px; }
            .info-row { flex-direction: column; align-items: flex-start; gap: 4px; }
        }
    </style>
</head>
<body class="profile-clean">

    <div class="dashboard-wrapper">
        <div class="dashboard-header">
            <img src="CodeChef New Logo 24-25.png" alt="CodeChef">
            <h1>Account Settings</h1>
        </div>

        <div class="clean-card">
            <div class="avatar-clean" id="avatar-initial">M</div>
            
            <h2 class="user-main-name" id="display-name">Loading...</h2>
            <div class="user-role-tag" id="display-role">Member</div>

            <div class="info-list">
                <div class="info-row">
                    <span class="info-label">Email Address</span>
                    <span class="info-value" id="display-email">...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Member Since</span>
                    <span class="info-value" id="display-date">...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Authentication</span>
                    <span class="info-value">Supabase Auth</span>
                </div>
            </div>

            <div class="button-group">
                <a href="index.html" class="btn-clean btn-black">
                    Return to Dashboard
                </a>
                <button id="logout-trigger" class="btn-clean btn-outline">
                    Sign Out
                </button>
            </div>
        </div>

        <a href="index.html" class="footer-link">CodeChef MIT-ADT Chapter</a>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        async function initCleanProfile() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const user = session.user;
            const name = user.user_metadata.full_name || 'Member';

            // DOM Updates
            document.getElementById('display-name').textContent = name;
            document.getElementById('display-email').textContent = user.email;
            document.getElementById('avatar-initial').textContent = name.charAt(0).toUpperCase();

            // Date Formulation
            const date = new Date(user.created_at);
            document.getElementById('display-date').textContent = date.toLocaleDateString(undefined, {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            // Fetch actual role
            const { data: profile } = await supabase
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .single();
            
            if (profile) {
                document.getElementById('display-role').textContent = profile.role;
            }
        }

        document.getElementById('logout-trigger').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        initCleanProfile();
    </script>
</body>
</html>
